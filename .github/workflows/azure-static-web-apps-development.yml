name: Azure Static Web Apps CI/CD (development)

on:
  push:
    branches:
      - development
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - development

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # Bake VITE_* vars at build time. Add/remove lines to match what vault-theo's code reads,
      # and set the corresponding repo secrets (Settings -> Secrets and variables -> Actions).
      # The block is safe to keep even before any VITE_* secret exists (values resolve empty).
      - name: Create .env for Vite build (from GitHub Secrets)
        shell: bash
        run: |
          cat > .env <<EOF
          VITE_ENTRA_CLIENT_ID=${{ secrets.VITE_ENTRA_CLIENT_ID }}
          VITE_ENTRA_TENANT_ID=${{ secrets.VITE_ENTRA_TENANT_ID }}
          VITE_ENTRA_AUTHORITY=${{ secrets.VITE_ENTRA_AUTHORITY }}
          VITE_ENTRA_API_SCOPE=${{ secrets.VITE_ENTRA_API_SCOPE }}
          VITE_FUNCTIONS_URL=${{ secrets.VITE_FUNCTIONS_URL }}
          VITE_STREAM_FUNCTIONS_URL=${{ secrets.VITE_STREAM_FUNCTIONS_URL }}
          EOF

      # The SWA deploy action builds (Oryx: npm install + npm run build) and deploys in one step.
      - name: Deploy to Azure Static Web Apps (dev)
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "upload"
          app_location: "/"         # repo root
          api_location: ""          # no SWA-managed API in this repo
          output_location: "dist"   # Vite output
          production_branch: "development"

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
          production_branch: "development"
